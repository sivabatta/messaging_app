# Compose file tailored for Dokploy.
# - Mongo and backend are NOT exposed to the host; only reachable inside the compose network.
# - Frontend exposes :80; assign a domain to it in the Dokploy UI -> Traefik will route + issue TLS.
# - Set JWT_SECRET and CLIENT_ORIGIN in the Dokploy "Environment" tab.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    expose:
      - "27017"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/messageapp
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 365d
      CLIENT_ORIGIN: ${CLIENT_ORIGIN}
      MEDIA_TTL_DAYS: 7
      MAX_IMAGE_MB: 10
      MAX_VIDEO_MB: 50
    expose:
      - "5000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

volumes:
  mongo-data:
